<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Reader - Office Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color:#fff; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height:100vh; }
.container { max-width:1400px; margin:0 auto; padding:30px 20px; }
header { display:flex; justify-content:space-between; align-items:center; padding:25px 0; margin-bottom:30px; border-bottom: 2px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap: 20px; }
.logo { font-size:52px; font-weight:900; background: linear-gradient(135deg, #06b6d4 0%, #f97316 50%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
.badge { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color:#fff; padding:8px 16px; border-radius:20px; font-size:12px; font-weight:700; text-transform: uppercase; letter-spacing: 2px; }
.stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:20px; margin-bottom:30px; }
.stat { background: rgba(30, 41, 59, 0.8); padding:30px; border-radius:20px; text-align:center; border: 1px solid rgba(255,255,255,0.1); }
.num { font-size:56px; font-weight:900; margin-bottom:10px; }
.green { color:#10b981; } .blue { color:#06b6d4; } .amber { color:#f97316; } .purple { color:#a855f7; }
.label { font-size:12px; color:#94a3b8; text-transform:uppercase; letter-spacing:2px; font-weight:600; }
.card { background: rgba(30, 41, 59, 0.8); padding:30px; border-radius:20px; margin-bottom:25px; border: 1px solid rgba(255,255,255,0.1); }
h2 { margin:0 0 25px; font-size:18px; color:#f1f5f9; font-weight:700; }
.company-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px; }
.company-item { background: rgba(15, 23, 42, 0.6); padding:25px; border-radius:15px; border-left: 5px solid #f97316; }
.company-name { font-weight:700; margin-bottom:10px; font-size:16px; color:#f1f5f9; }
.company-count { font-size:48px; font-weight:900; color:#f97316; line-height: 1; }
.controls { display:flex; gap:15px; margin-bottom:25px; flex-wrap:wrap; align-items: center; }
.control-group { flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 6px; }
.control-group label { font-size: 11px; text-transform: uppercase; color: #94a3b8; font-weight: 700; letter-spacing: 1px; }
input, select { width: 100%; padding:14px 18px; border-radius:12px; border:2px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.6); color:#fff; font-size:15px; }
input:focus, select:focus { outline: none; border-color: #06b6d4; }
select option { background: #0f172a; color: #fff; }
.btn-row { display: flex; gap: 10px; align-items: flex-end; }
button { padding:14px 24px; border-radius:12px; border:none; font-weight:700; cursor:pointer; color:#fff; text-transform: uppercase; letter-spacing: 1px; font-size:14px; height: 52px; }
.btn-refresh { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
.btn-export { background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%); }
.btn-clear { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
button:hover { transform: translateY(-2px); }
table { width:100%; border-collapse:separate; border-spacing: 0; }
th { background: rgba(15, 23, 42, 0.8); padding:16px; text-align:left; font-size:11px; color:#94a3b8; text-transform:uppercase; letter-spacing: 1.5px; font-weight:700; }
th:first-child { border-top-left-radius: 10px; }
th:last-child { border-top-right-radius: 10px; }
td { padding:18px 16px; border-bottom:1px solid rgba(255,255,255,0.05); }
tr:hover { background: rgba(255,255,255,0.05); }
.method-badge { padding:6px 14px; border-radius:20px; font-size:11px; font-weight:700; text-transform: uppercase; letter-spacing: 1px; display: inline-block; }
.face { background: rgba(6, 182, 212, 0.2); color:#22d3ee; border: 1px solid rgba(34, 211, 238, 0.3); }
.qr { background: rgba(5, 150, 105, 0.2); color:#34d399; border: 1px solid rgba(52, 211, 153, 0.3); }
.action-badge { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; text-transform: uppercase; letter-spacing: 1px; display: inline-block; }
.in { background: rgba(16, 185, 129, 0.2); color:#34d399; border: 1px solid rgba(52, 211, 153, 0.3); }
.out { background: rgba(249, 115, 22, 0.2); color:#fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); }
.time { color:#94a3b8; font-family:'Courier New', monospace; font-size:14px; }
.location-cell { font-size:12px; color:#a5b4fc; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.location-icon { display:inline-block; margin-right:5px; color:#f97316; }
.map-link { color:#06b6d4; text-decoration:none; font-size:11px; margin-left:5px; }
.map-link:hover { text-decoration:underline; }
.empty { text-align:center; color:#64748b; padding:50px; font-size:16px; }
.footer { text-align:center; font-size:12px; color:#64748b; margin-top:40px; padding:25px 0; border-top: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo">FACE READER</div>
<div class="badge">● Live</div>
</header>

<div class="stats">
<div class="stat"><div class="num green" id="onsite">0</div><div class="label">Currently On Site</div></div>
<div class="stat"><div class="num blue" id="total">0</div><div class="label">Total Sign-Ins Today</div></div>
<div class="stat"><div class="num amber" id="recent">0</div><div class="label">Last 15 Minutes</div></div>
<div class="stat"><div class="num purple" id="unique">0</div><div class="label">Unique Operatives</div></div>
</div>

<div class="card">
<h2>📊 Operatives by Company</h2>
<div class="company-grid" id="companyGrid"><div class="empty">Loading...</div></div>
</div>

<div class="controls">
<div class="control-group">
<label for="locationFilter">Filter by Location / Site Zone</label>
<select id="locationFilter">
<option value="">All Locations</option>
</select>
</div>
<div class="control-group">
<label for="search">Search Operatives / Companies</label>
<input type="text" id="search" placeholder="Filter by name, company, or method...">
</div>
<div class="btn-row">
<button class="btn-refresh" onclick="location.reload()">↻ Refresh</button>
<button class="btn-export" onclick="exportCSV()"> Export CSV</button>
<button class="btn-clear" onclick="clearToday()"> Clear Today</button>
</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Operative</th>
<th>Method</th>
<th>Action</th>
<th>Location</th>
<th>Time</th>
<th>Elapsed</th>
</tr>
</thead>
<tbody id="tbody"><tr><td colspan="6" class="empty">Connecting to database...</td></tr></tbody>
</table>
</div>

<div class="footer">We Are A Team Together Ltd © 2026</div>
</div>

<script>
const SITE_ID = "I";
const firebaseConfig = {
apiKey: "AIzaSyCjpAPXDDsHHgAwVng535ZhDwj604zCBZw",
authDomain: "signin-facereader.firebaseapp.com",
databaseURL: "https://signin-facereader-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "signin-facereader",
storageBucket: "signin-facereader.firebasestorage.app",
messagingSenderId: "815339415778",
appId: "1:815339415778:web:d4b131f38c8d6a42f716bb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const signinsRef = db.ref('sites/' + SITE_ID + '/signins');
const statusRef = db.ref('sites/' + SITE_ID + '/status');
const operativesRef = db.ref('sites/' + SITE_ID + '/operatives');

let allRecords = [];
let statusData = {};
let allOperatives = {};

function todayStart() { const d = new Date(); d.setHours(0, 0, 0, 0); return d.getTime(); }

function escapeHtml(text) {
if (!text) return '';
const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
return String(text).replace(/[&<>"']/g, m => map[m]);
}

function timeAgo(ts) {
if (!ts) return 'unknown';
const s = Math.floor((Date.now() - ts) / 1000);
if (s < 60) return s + 's ago';
if (s < 3600) return Math.floor(s / 60) + 'm ago';
if (s < 86400) return Math.floor(s / 3600) + 'h ago';
return Math.floor(s / 86400) + 'd ago';
}

function updateLocationDropdown() {
const select = document.getElementById('locationFilter');
const currentLocation = select.value;
const locations = new Set();

// Gather locations from operatives configuration and sign-in logs
Object.values(allOperatives).forEach(op => { if (op && op.location) locations.add(op.location); });
allRecords.forEach(r => {
if (r.location && r.location.address) locations.add(r.location.address);
if (r.operativeLocation) locations.add(r.operativeLocation);
});

const sortedLocations = Array.from(locations).filter(l => l && l.trim() !== '').sort();
let html = '<option value="">All Locations</option>';
sortedLocations.forEach(loc => {
html += `<option value="${escapeHtml(loc)}">${escapeHtml(loc)}</option>`;
});
select.innerHTML = html;
if (locations.has(currentLocation)) { select.value = currentLocation; }
}

function render() {
const selectedLocation = document.getElementById('locationFilter').value;
const today = todayStart();
const todays = allRecords.filter(r => r.timestamp && r.timestamp >= today);

// Filter status records based on location match if selected
const filteredStatus = Object.values(statusData).filter(s => {
if (!s || !s.onSite) return false;
if (selectedLocation) {
const opLoc = allOperatives[s.operativeId]?.location || s.location || '';
if (opLoc !== selectedLocation) return false;
}
return true;
});

const onSiteNow = filteredStatus.length;
const totalIns = todays.filter(r => {
if (r.action !== 'IN') return false;
if (selectedLocation) {
const opLoc = allOperatives[r.operativeId]?.location || r.operativeLocation || (r.location && r.location.address) || '';
if (opLoc !== selectedLocation) return false;
}
return true;
}).length;

const recent = todays.filter(r => {
if (Date.now() - r.timestamp >= 15 * 60 * 1000) return false;
if (selectedLocation) {
const opLoc = allOperatives[r.operativeId]?.location || r.operativeLocation || (r.location && r.location.address) || '';
if (opLoc !== selectedLocation) return false;
}
return true;
}).length;

const unique = new Set(todays.filter(r => {
if (selectedLocation) {
const opLoc = allOperatives[r.operativeId]?.location || r.operativeLocation || (r.location && r.location.address) || '';
if (opLoc !== selectedLocation) return false;
}
return true;
}).map(r => r.operativeId)).size;

document.getElementById('onsite').textContent = onSiteNow;
document.getElementById('total').textContent = totalIns;
document.getElementById('recent').textContent = recent;
document.getElementById('unique').textContent = unique;

const companyCount = {};
filteredStatus.forEach(s => {
const company = s.company || 'Unknown';
companyCount[company] = (companyCount[company] || 0) + 1;
});

const companies = Object.entries(companyCount).sort((a, b) => b[1] - a[1]);
const grid = document.getElementById('companyGrid');
grid.innerHTML = companies.length ? companies.map(([c, n]) => `<div class="company-item"><div class="company-name">${escapeHtml(c)}</div><div class="company-count">${n}</div></div>`).join('') : '<div class="empty">No operatives on site for this location filter</div>';

const tbody = document.getElementById('tbody');
const filter = document.getElementById('search').value.toLowerCase();

let records = todays.filter(r => {
if (selectedLocation) {
const opLoc = allOperatives[r.operativeId]?.location || r.operativeLocation || (r.location && r.location.address) || '';
if (opLoc !== selectedLocation) return false;
}
const name = r.operativeName ? r.operativeName.toLowerCase() : '';
const company = r.operativeCompany ? r.operativeCompany.toLowerCase() : '';
const method = r.method ? r.method.toLowerCase() : '';
return name.includes(filter) || company.includes(filter) || method.includes(filter);
});

records.sort((a, b) => b.timestamp - a.timestamp);

if (records.length === 0) {
tbody.innerHTML = '<tr><td colspan="6" class="empty">No records today</td></tr>';
} else {
tbody.innerHTML = records.map(r => {
const time = new Date(r.timestamp).toLocaleTimeString();
const methodClass = r.method === 'FACE' ? 'face' : 'qr';
const actionClass = r.action === 'IN' ? 'in' : 'out';

let locationHtml = '<span style="color:#64748b">No location</span>';
if (r.location && r.location.address) {
const mapUrl = `https://www.google.com/maps?q=${r.location.lat},${r.location.lng}`;
locationHtml = `<span class="location-icon">📍</span><span class="location-cell" title="${escapeHtml(r.location.address)}">${escapeHtml(r.location.address)}</span><a href="${mapUrl}" target="_blank" class="map-link"> View</a>`;
} else if (r.location && r.location.lat) {
const mapUrl = `https://www.google.com/maps?q=${r.location.lat},${r.location.lng}`;
locationHtml = `<span class="location-cell">${r.location.lat.toFixed(4)}, ${r.location.lng.toFixed(4)}</span><a href="${mapUrl}" target="_blank" class="map-link">🗺 View</a>`;
}

return `<tr>
<td><div style="font-weight:700; font-size:15px;">${escapeHtml(r.operativeName)}</div>${r.operativeCompany ? `<div style="font-size:12px; color:#f97316; margin-top:4px;">${escapeHtml(r.operativeCompany)}</div>` : ''}</td>
<td><span class="method-badge ${methodClass}">${r.method || 'Unknown'}</span></td>
<td><span class="action-badge ${actionClass}">${r.action || 'Unknown'}</span></td>
<td>${locationHtml}</td>
<td class="time">${time}</td>
<td class="time">${timeAgo(r.timestamp)}</td>
</tr>`;
}).join('');
}
}

signinsRef.on('value', snap => {
allRecords = [];
snap.forEach(child => { const val = child.val(); if(val) allRecords.push({ id: child.key, ...val }); });
updateLocationDropdown();
render();
});

statusRef.on('value', snap => {
statusData = {};
snap.forEach(child => { statusData[child.key] = child.val(); });
updateLocationDropdown();
render();
});

operativesRef.on('value', snap => {
allOperatives = {};
snap.forEach(child => { allOperatives[child.key] = child.val(); });
updateLocationDropdown();
render();
});

document.getElementById('search').addEventListener('input', render);
document.getElementById('locationFilter').addEventListener('change', render);

function exportCSV() {
const selectedLocation = document.getElementById('locationFilter').value;
const today = todayStart();
const data = allRecords.filter(r => {
if (!r.timestamp || r.timestamp < today) return false;
if (selectedLocation) {
const opLoc = allOperatives[r.operativeId]?.location || r.operativeLocation || (r.location && r.location.address) || '';
if (opLoc !== selectedLocation) return false;
}
return true;
});
if (data.length === 0) { alert('No records to export'); return; }
let csv = 'Date,Time,Name,Company,Method,Action,Location,Lat,Lng\n';
data.sort((a, b) => a.timestamp - b.timestamp).forEach(r => {
const date = new Date(r.timestamp).toISOString().split('T')[0];
const time = new Date(r.timestamp).toLocaleTimeString();
const loc = r.location ? r.location.address || `${r.location.lat},${r.location.lng}` : '';
const lat = r.location ? r.location.lat : '';
const lng = r.location ? r.location.lng : '';
csv += `"${date}","${time}","${r.operativeName || ''}","${r.operativeCompany || ''}","${r.method || ''}","${r.action || ''}","${loc}","${lat}","${lng}"\n`;
});
const blob = new Blob([csv], { type: 'text/csv' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a'); a.href = url; a.download = `face-reader-${SITE_ID}-${new Date().toISOString().split('T')[0]}.csv`; a.click();
}

async function clearToday() {
if (!confirm('⚠️ Reset dashboard? This will delete today\'s records and reset the live status.')) return;

const today = todayStart();
const updates = {};

allRecords.forEach(r => {
if (r.timestamp && r.timestamp >= today) {
updates['signins/' + r.id] = null;
}
});

updates['status'] = null;

try {
await db.ref('sites/' + SITE_ID).update(updates);
alert('✅ Dashboard reset successfully!');
location.reload();
} catch (err) {
alert('Error: ' + err.message);
}
}

render();
</script>
</body>
</html>
