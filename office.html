<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Reader - Office Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color:#fff; font-family:'Segoe UI', sans-serif; min-height:100vh; }
.container { max-width:1400px; margin:0 auto; padding:30px 20px; }
header { display:flex; justify-content:space-between; align-items:center; padding:25px 0; margin-bottom:30px; border-bottom: 2px solid rgba(255,255,255,0.1); }
.logo { font-size:32px; font-weight:900; color: #06b6d4; }
.badge { background: linear-gradient(135deg, #10b981, #059669); color:#fff; padding:8px 16px; border-radius:20px; font-size:12px; font-weight:700; }
.stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:20px; margin-bottom:30px; }
.stat { background: rgba(30, 41, 59, 0.8); padding:30px; border-radius:20px; text-align:center; }
.num { font-size:56px; font-weight:900; margin-bottom:10px; }
.green { color:#10b981; } .blue { color:#06b6d4; } .amber { color:#f97316; } .purple { color:#a855f7; }
.label { font-size:12px; color:#94a3b8; text-transform:uppercase; letter-spacing:2px; }
.card { background: rgba(30, 41, 59, 0.8); padding:30px; border-radius:20px; margin-bottom:25px; }
h2 { margin:0 0 25px; font-size:18px; color:#f1f5f9; }
.controls { display:flex; gap:15px; margin-bottom:25px; flex-wrap:wrap; align-items: center; }
input, select { padding:14px 18px; border-radius:12px; border:2px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.6); color:#fff; font-size:15px; }
input { flex:1; min-width:250px; }
input:focus, select:focus { outline: none; border-color: #06b6d4; }
select { min-width: 200px; cursor: pointer; }
button { padding:14px 24px; border-radius:12px; border:none; font-weight:700; cursor:pointer; color:#fff; }
.btn-refresh { background: linear-gradient(135deg, #6366f1, #4f46e5); }
.btn-export { background: linear-gradient(135deg, #06b6d4, #0891b2); }
.btn-clear { background: linear-gradient(135deg, #ef4444, #dc2626); }
table { width:100%; }
th { background: rgba(15, 23, 42, 0.8); padding:16px; text-align:left; font-size:11px; color:#94a3b8; text-transform:uppercase; font-weight:700; }
td { padding:18px 16px; border-bottom:1px solid rgba(255,255,255,0.05); }
tr:hover { background: rgba(255,255,255,0.05); }
.method-badge, .action-badge { padding:6px 14px; border-radius:20px; font-size:11px; font-weight:700; display: inline-block; }
.face { background: rgba(6, 182, 212, 0.2); color:#22d3ee; }
.qr { background: rgba(140, 142, 144, 0.2); color:#8C8E90; }
.in { background: rgba(16, 185, 129, 0.2); color:#34d399; }
.out { background: rgba(249, 115, 22, 0.2); color:#fbbf24; }
.time { color:#94a3b8; font-family:'Courier New', monospace; font-size:14px; }
.location-cell { font-size:12px; color:#a5b4fc; }
.map-link { color:#06b6d4; text-decoration:none; font-size:11px; margin-left:5px; }
.empty { text-align:center; color:#64748b; padding:50px; font-size:16px; }
.footer { text-align:center; font-size:12px; color:#8C8E90; margin-top:40px; padding:25px 0; border-top: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo">FACE READER</div>
<div class="badge">● Live</div>
</header>

<div class="stats">
<div class="stat"><div class="num green" id="onsite">0</div><div class="label">Currently On Site</div></div>
<div class="stat"><div class="num blue" id="total">0</div><div class="label">Total Sign-Ins Today</div></div>
<div class="stat"><div class="num amber" id="recent">0</div><div class="label">Last 15 Minutes</div></div>
<div class="stat"><div class="num purple" id="unique">0</div><div class="label">Unique Operatives</div></div>
</div>

<div class="controls">
<select id="locationFilter" onchange="render()">
<option value="all">All Locations</option>
</select>
<input type="text" id="searchInput" placeholder="🔍 Search by name, company, or method..." onkeyup="render()">
<button class="btn-refresh" onclick="location.reload()">↻ Refresh</button>
<button class="btn-export" onclick="exportCSV()">Export CSV</button>
<button class="btn-clear" onclick="clearToday()">Clear Today</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Operative</th>
<th>Assigned Location</th>
<th>Method</th>
<th>Action</th>
<th>GPS Proof</th>
<th>Time</th>
<th>Elapsed</th>
</tr>
</thead>
<tbody id="tbody"><tr><td colspan="7" class="empty">Connecting to database...</td></tr></tbody>
</table>
</div>

<div class="footer">Face Reader Basic - We are a team together Ltd ©️ 2026</div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyB1m4mgU_r71POdSD8vxzIq2BrSk7K0M-o",
authDomain: "face-reader-basic.firebaseapp.com",
databaseURL: "https://face-reader-basic-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "face-reader-basic",
storageBucket: "face-reader-basic.firebasestorage.app",
messagingSenderId: "645270939984",
appId: "1:645270939984:web:aa43a6522527a83941e455"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const signinsRef = db.ref('signins');
const statusRef = db.ref('status');

let allRecords = [];
let statusData = {};

function todayStart() {
const d = new Date();
d.setHours(0, 0, 0, 0);
return d.getTime();
}

function escapeHtml(text) {
if (!text) return '';
const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
return String(text).replace(/[&<>"']/g, m => map[m]);
}

function timeAgo(ts) {
if (!ts) return 'unknown';
const s = Math.floor((Date.now() - ts) / 1000);
if (s < 60) return s + 's ago';
if (s < 3600) return Math.floor(s / 60) + 'm ago';
return Math.floor(s / 3600) + 'h ago';
}

function render() {
const today = todayStart();
const locFilter = document.getElementById('locationFilter').value;
const searchText = document.getElementById('searchInput').value.toLowerCase();

// Filter today's records
let todays = allRecords.filter(r => r.timestamp && r.timestamp >= today);

// Apply location filter
if (locFilter !== 'all') {
todays = todays.filter(r => r.assignedLocation === locFilter);
}

// Apply search filter
if (searchText.trim() !== '') {
todays = todays.filter(r => {
const name = (r.operativeName || '').toLowerCase();
const company = (r.operativeCompany || '').toLowerCase();
const method = (r.method || '').toLowerCase();
const location = (r.assignedLocation || '').toLowerCase();
return name.includes(searchText) || company.includes(searchText) || method.includes(searchText) || location.includes(searchText);
});
}

// Update stats
const onSiteNow = Object.values(statusData).filter(s => s && s.onSite).length;
const totalIns = todays.filter(r => r.action === 'IN').length;
const recent = todays.filter(r => Date.now() - r.timestamp < 15 * 60 * 1000).length;
const unique = new Set(todays.map(r => r.operativeId)).size;

document.getElementById('onsite').textContent = onSiteNow;
document.getElementById('total').textContent = totalIns;
document.getElementById('recent').textContent = recent;
document.getElementById('unique').textContent = unique;

// Update location dropdown
const select = document.getElementById('locationFilter');
const currentVal = select.value;
const uniqueLocations = new Set(['all']);
allRecords.forEach(r => { if(r.assignedLocation) uniqueLocations.add(r.assignedLocation); });

select.innerHTML = '';
uniqueLocations.forEach(loc => {
const opt = document.createElement('option');
opt.value = loc;
opt.textContent = loc === 'all' ? 'All Locations' : loc;
select.appendChild(opt);
});
select.value = currentVal || 'all';

// Render table
const tbody = document.getElementById('tbody');

if (todays.length === 0) {
tbody.innerHTML = '<tr><td colspan="7" class="empty">No records found</td></tr>';
return;
}

todays.sort((a, b) => b.timestamp - a.timestamp);

tbody.innerHTML = todays.map(r => {
const time = new Date(r.timestamp).toLocaleTimeString();
const methodClass = r.method === 'FACE' ? 'face' : 'qr';
const actionClass = r.action === 'IN' ? 'in' : 'out';

let locationHtml = '<span style="color:#64748b">No GPS</span>';
if (r.location && r.location.address) {
const mapUrl = `https://www.google.com/maps?q=${r.location.lat},${r.location.lng}`;
locationHtml = `<span class="location-cell">${escapeHtml(r.location.address)}</span><a href="${mapUrl}" target="_blank" class="map-link">🗺️</a>`;
} else if (r.location && r.location.lat) {
const mapUrl = `https://www.google.com/maps?q=${r.location.lat},${r.location.lng}`;
locationHtml = `<span class="location-cell">${r.location.lat.toFixed(4)}, ${r.location.lng.toFixed(4)}</span><a href="${mapUrl}" target="_blank" class="map-link">🗺️</a>`;
}

return `<tr>
<td>
<div style="font-weight:700;">${escapeHtml(r.operativeName)}</div>
<div style="font-size:12px; color:#06b6d4;">${escapeHtml(r.operativeCompany)}</div>
</td>
<td><div style="color:#a855f7;">${escapeHtml(r.assignedLocation || 'Unassigned')}</div></td>
<td><span class="method-badge ${methodClass}">${r.method}</span></td>
<td><span class="action-badge ${actionClass}">${r.action}</span></td>
<td>${locationHtml}</td>
<td class="time">${time}</td>
<td class="time">${timeAgo(r.timestamp)}</td>
</tr>`;
}).join('');
}

// Listen for database changes
signinsRef.on('value', snap => {
console.log(' Received signins data');
allRecords = [];
snap.forEach(child => {
const val = child.val();
if(val) allRecords.push({ id: child.key, ...val });
});
console.log('Total records:', allRecords.length);
render();
});

statusRef.on('value', snap => {
console.log('📥 Received status data');
statusData = {};
snap.forEach(child => {
statusData[child.key] = child.val();
});
render();
});

function exportCSV() {
const today = todayStart();
const data = allRecords.filter(r => r.timestamp && r.timestamp >= today);

if (data.length === 0) {
alert('No records to export');
return;
}

let csv = 'Date,Time,Name,Company,Location,Method,Action\n';
data.forEach(r => {
csv += `"${new Date(r.timestamp).toISOString().split('T')[0]}","${new Date(r.timestamp).toLocaleTimeString()}","${r.operativeName}","${r.operativeCompany}","${r.assignedLocation}","${r.method}","${r.action}"\n`;
});

const blob = new Blob([csv], { type: 'text/csv' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = `face-reader-${new Date().toISOString().split('T')[0]}.csv`;
a.click();
}

async function clearToday() {
if (!confirm('Delete all today\'s records?')) return;
const today = todayStart();
const updates = {};
allRecords.forEach(r => {
if (r.timestamp && r.timestamp >= today) {
updates['signins/' + r.id] = null;
}
});
await db.ref().update(updates);
alert('Cleared!');
location.reload();
}

console.log('🚀 Office dashboard loaded');
</script>
</body>
</html>
